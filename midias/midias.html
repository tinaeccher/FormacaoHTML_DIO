<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Mídias</title>
</head>
<body style="background-color: black;">
    <div>
    <!--tag imagem para mostrar na tela-->
    <img title="Certificação CTFL" alt="Certificação de testes Nível fundamental" 
        src="CTFL.jpg" width="200"/>
    <img title="Certificação Masterclass" alt="Certificado do curso masterclass"
    src="Certificado_Masterclass.png" width="300"/>
    </div>
    <div>
        <br><p>Mostra um player do audio com os controles</p>
        <audio controls src="2.3 Testes de Manutenção.m4a"></audio>
    </div>
    <video controls>
        <br><p>Mostra um video com os controles</p>
        <source src="clipe.mp4"/>
        <track src="legenda.vtt" kind="captions" srclang="eng">
    </video>

    <div>
        <iframe width="560" 
            src="https://www.youtube.com/embed/dzhJsc1YszU?si=JSTwlqyy78Q4VCOI" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
    </div>

</body>
</html>
