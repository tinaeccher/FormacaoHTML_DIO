<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página de Estudo - Apenas HTML</title>
    <style>
        .row{
            margin: 5px;
        }
        label{
            width: 100px;
            text-align: right;
            display: inline-block;
            padding-right: 5px;
        }
        fieldset{
            margin: 10px 0;
            border-radius: 10px;
            border-color: chocolate;
        }
    </style>
</head>
<body>
    <div><h1>Frames - embed X iframes</h1>
        <iframe src="http://dio.me" width ="500" height="400"></iframe>
        <!--é usada para incorporar outro documento (página web, vídeo, mapa) dentro da página atual-->
    </div>
    <div>
        <iframe width="560" 
            src="https://www.youtube.com/embed/dzhJsc1YszU?si=JSTwlqyy78Q4VCOI" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
    </div>
    <div>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d198740.77847958123!2d-77.17928216619475!3d38.89369036442296!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89b7c6de5af6e45b%3A0xc2524522d4885d2a!2sWashington%2C%20D.C.%2C%20Distrito%20de%20Columbia%2C%20EUA!5e0!3m2!1spt-BR!2sbr!4v1772656297590!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <div>
        <h1>Cadastro de Aluno</h1>
        <p>Preencha os dados abaixo para prosseguir com o curso.</p>
    </div>

    <hr> <form>
        <fieldset><!-- cria uma borda em volta dos campos-->
            <legend>Dados Identificadores</legend><!--inclui um título para a borda-->
            
            <div class="row"> <!--div com css para separar os campos-->
                <label for="nome">Nome:</label><input type="text"/>
                <label for="email">E-mail:</label><input type="text"/>
            </div>

            <div class="row"> <!--div com css para separar os campos-->
                <label for="profissao">Profissao:</label><input type="text"/>
                <label for="profissao">Empresa</label><input type="text"/>
            </div>
        </fieldset>

        <fieldset>
            <legend>Endereço</legend> <!--inclui um título para a borda-->
            
                <div class="row"> <!--div com css para separar os campos-->
                <label for="Endereço">Endereço</label><input type="text"/>
                <label for="Numero">Numero</label><input type="text" style="width: 30px;" width="10"/>
                </div>

                <div class="row"> <!--div com css para separar os campos-->
                    <label for="Bairro">Bairro</label><input type="text"/>
                    <label for="Cidade">Cidade/UF</label><input type="text"/>
                </div>
        </fieldset>
        
        <fieldset>
            <legend>Informações de Contato</legend> <!--inclui um título para a borda-->
                <div class="row"> <!--div com css para separar os campos-->
                    <label for="Celular">Celular</label><input type="text"/>
                    <label for="Whatsapp">Whatsapp</label><input type="text"/>
                </div>
                <div class="row"> <!--div com css para separar os campos-->
                    <label for="LinkedIn">LinkedIn</label><input type="text"/>
                    <label for="Github">Github</label><input type="text"/>
                </div>
        </fieldset>
        
            <div>
                <button type="submit">Enviar Dados</button>
                <button type="reset">Limpar Tudo</button>
            </div>
            <div>
            <p><h2>Cores</h2></p>
                <p> Consulte as cores no site: https://www.w3schools.com/colors/colors_names.asp </p>
            </div>
    </form>

    <hr>
    <div>
        <footer>
            <p>Página criada para fins didáticos.</p>
        </footer>
    </div>

</body>
</html>
